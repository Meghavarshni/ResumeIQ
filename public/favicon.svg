<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Indigo Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Cyan Accent Gradient -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Mode Background Tile -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#primaryGrad)" stroke-width="6" opacity="0.3" />

  <!-- Document/Resume Base (Angled) -->
  <g transform="matrix(0.96 0.05 -0.05 0.96 32 40)">
    <!-- Document Body -->
    <rect x="80" y="80" width="280" height="360" rx="20" fill="#ffffff" opacity="0.95" />
    <!-- Dog Ear Fold -->
    <path d="M310 80 L360 130 L310 130 Z" fill="#cbd5e1" />
    <path d="M360 130 L310 130 L360 80 Z" fill="#e2e8f0" />
    
    <!-- Mock Text Lines -->
    <rect x="120" y="140" width="130" height="16" rx="8" fill="#94a3b8" />
    <rect x="120" y="180" width="200" height="12" rx="6" fill="#cbd5e1" />
    <rect x="120" y="210" width="160" height="12" rx="6" fill="#cbd5e1" />
    <rect x="120" y="240" width="180" height="12" rx="6" fill="#cbd5e1" />
    
    <rect x="120" y="290" width="100" height="16" rx="8" fill="#94a3b8" />
    <rect x="120" y="330" width="200" height="12" rx="6" fill="#cbd5e1" />
    <rect x="120" y="360" width="150" height="12" rx="6" fill="#cbd5e1" />
  </g>

  <!-- IQ Intelligence overlay (Brain nodes and Sparkles) -->
  <g filter="url(#glow)">
    <!-- Brain outline or Neural network -->
    <path d="M 280,240 C 280,180 320,160 360,180 C 390,160 430,170 430,220 C 450,230 460,260 450,290 C 460,320 440,360 410,360 C 390,380 340,380 320,350 C 290,360 270,320 280,290 C 265,275 265,255 280,240 Z" fill="none" stroke="url(#secondaryGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
    
    <!-- Sparkle 1 (Large Cyan Sparkle) -->
    <path d="M 390,260 L 400,230 L 410,260 L 440,270 L 410,280 L 400,310 L 390,280 L 360,270 Z" fill="url(#secondaryGrad)" />
    
    <!-- Sparkle 2 (Medium Purple Sparkle) -->
    <path d="M 290,190 L 297,170 L 304,190 L 324,197 L 304,204 L 297,224 L 290,204 L 270,197 Z" fill="url(#primaryGrad)" />
    
    <!-- Connective Neural Lines and Nodes -->
    <line x1="300" y1="197" x2="390" y2="270" stroke="url(#secondaryGrad)" stroke-width="4" opacity="0.6" />
    <line x1="400" y1="270" x2="410" y2="360" stroke="url(#primaryGrad)" stroke-width="4" opacity="0.6" />
    
    <circle cx="300" cy="197" r="8" fill="#6366f1" />
    <circle cx="390" cy="270" r="10" fill="#06b6d4" />
    <circle cx="410" cy="360" r="8" fill="#8b5cf6" />
  </g>
</svg>